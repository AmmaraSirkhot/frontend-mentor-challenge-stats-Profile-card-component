<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Profile card component</title>
</head>

<body>
    <div class="profile-card">
       <img src="./images/bg-pattern-card.svg" alt="Bkgrnd pattern." class="bg-image"><!--profile-bg-image -->
      <div class="profile-content">
        <img src="./images/image-victor.jpg" alt="User image." class="image"><!--profile-image -->
        <div class="name-area"><!--profile-name-area -->
          <h1 class="name"><!--profile-name -->Vicor Crest</h1>
          <p class="age"><!--profile-age -->26</p>
        </div>
        <p class="city"><!--profile-city -->London</p>
        <div class="stats"><!--stats-area -->
          <div class="stat">
            <h2 class="number"><!--stats-number -->80K</h2>
            <p class="title"><!--stats-title -->Followers</p>
          </div>
          <div class="stat">
            <h2 class="number"><!--stats-number -->80.3K</h2>
            <p class="title"><!--stats-title -->Likes</p>
          </div>
          <div class="stat">
            <h2 class="number"><!--stats-number -->1.4K</h2>
            <p class="title"><!--stats-title -->Photos</p>
          </div>
        </div>
      </div>
    </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Umme Ammara</a>.
  </div>
</body>

</html>
